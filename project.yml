name: Oikomi
options:
  bundleIdPrefix: com.shuhirouchi.oikomi
  developmentLanguage: ja
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "3G65G8Z7QY"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: NO

packages:
  OikomiKit:
    path: Packages/OikomiKit

targets:
  Oikomi:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/iOS
    dependencies:
      - package: OikomiKit
        product: OikomiKit
      - target: OikomiWidgets
        embed: true
    info:
      path: App/iOS/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHealthShareUsageDescription: "HRV・睡眠・心拍データを使ってトレーニング負荷を最適化します"
        NSHealthUpdateUsageDescription: "ワークアウト記録をヘルスケアに保存します"
        NSMotionUsageDescription: "Apple Watch のセンサーでレップ自動カウントに使用します"
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - remote-notification
          - processing
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
    entitlements:
      path: App/iOS/Oikomi.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.shuhirouchi.oikomi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shuhirouchi.oikomi
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  OikomiWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Widgets
    dependencies:
      - package: OikomiKit
        product: OikomiKit
    info:
      path: App/Widgets/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shuhirouchi.oikomi.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES

  OikomiWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Watch
    dependencies:
      - package: OikomiKit
        product: OikomiKit
    info:
      path: App/Watch/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKRunsIndependentlyOfCompanionApp: true
        WKCompanionAppBundleIdentifier: com.shuhirouchi.oikomi
        WKSupportsLiveActivities: true
        WKBackgroundModes:
          - remote-notification
        NSHealthShareUsageDescription: "HRV・睡眠・心拍データを使ってトレーニング負荷を最適化します"
        NSHealthUpdateUsageDescription: "ワークアウト記録をヘルスケアに保存します"
    entitlements:
      path: App/Watch/OikomiWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.shuhirouchi.oikomi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shuhirouchi.oikomi.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"

  OikomiMac:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Mac
    dependencies:
      - package: OikomiKit
        product: OikomiKit
    info:
      path: App/Mac/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHealthShareUsageDescription: "HRV・睡眠・心拍データを使ってトレーニング負荷を最適化します"
        NSHealthUpdateUsageDescription: "ワークアウト記録をヘルスケアに保存します"
    entitlements:
      path: App/Mac/OikomiMac.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.shuhirouchi.oikomi
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shuhirouchi.oikomi.mac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES

schemes:
  Oikomi:
    build:
      targets:
        Oikomi: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
  OikomiWatch:
    build:
      targets:
        OikomiWatch: all
    run:
      config: Debug
  OikomiMac:
    build:
      targets:
        OikomiMac: all
    run:
      config: Debug
