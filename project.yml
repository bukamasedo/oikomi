name: Oikomi
options:
  bundleIdPrefix: com.shuhirouchi.oikomi
  developmentLanguage: ja
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "3G65G8Z7QY"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: NO

packages:
  OikomiKit:
    path: Packages/OikomiKit

targets:
  Oikomi:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/iOS
    dependencies:
      - package: OikomiKit
        product: OikomiKit
      - target: OikomiWidgets
        embed: true
      - target: OikomiWatch
        embed: true
        codeSign: false
    info:
      path: App/iOS/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "11"
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "トレーニング負荷とコンディションを可視化するため、HRV・安静時心拍数・睡眠時間・体重・体脂肪率・除脂肪体重を読み取ります。読み取ったデータはオンデバイスで処理され、iCloud 同期を有効にした場合のみご自身のプライベート iCloud に保存されます。第三者への送信は行いません。"
        NSHealthUpdateUsageDescription: "完了したワークアウトを「ヘルスケア」に保存し、Apple Watch のアクティビティリングに反映します。"
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.shuhirouchi.oikomi.coaching.refresh
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
          CFBundleAlternateIcons:
            AppIconProtein:
              CFBundleIconName: AppIconProtein
              CFBundleIconFiles:
                - AppIconProtein
              UIPrerenderedIcon: false
            AppIconBarbell:
              CFBundleIconName: AppIconBarbell
              CFBundleIconFiles:
                - AppIconBarbell
              UIPrerenderedIcon: false
    entitlements:
      path: App/iOS/Oikomi.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.shuhirouchi.oikomi
        com.apple.security.application-groups:
          - group.com.shuhirouchi.oikomi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shuhirouchi.oikomi
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: AppIconProtein AppIconBarbell
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  OikomiWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Widgets
    dependencies:
      - package: OikomiKit
        product: OikomiKit
    info:
      path: App/Widgets/Info.plist
      properties:
        CFBundleDisplayName: Oikomi Widgets
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "11"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: App/Widgets/OikomiWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.shuhirouchi.oikomi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shuhirouchi.oikomi.widgets
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES

  OikomiWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Watch
    dependencies:
      - package: OikomiKit
        product: OikomiKit
      - target: OikomiWatchWidgets
        embed: true
    info:
      path: App/Watch/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "11"
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKBackgroundModes:
          - workout-processing
        WKRunsIndependentlyOfCompanionApp: true
        WKCompanionAppBundleIdentifier: com.shuhirouchi.oikomi
        WKSupportsLiveActivities: true
        NSHealthShareUsageDescription: "トレーニング負荷とコンディションを可視化するため、HRV・安静時心拍数・睡眠時間・体重・体脂肪率・除脂肪体重を読み取ります。読み取ったデータはオンデバイスで処理され、iCloud 同期を有効にした場合のみご自身のプライベート iCloud に保存されます。第三者への送信は行いません。"
        NSHealthUpdateUsageDescription: "完了したワークアウトを「ヘルスケア」に保存し、Apple Watch のアクティビティリングに反映します。"
    entitlements:
      path: App/Watch/OikomiWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.shuhirouchi.oikomi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shuhirouchi.oikomi.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"

  OikomiWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: App/WatchWidgets
      - path: App/Widgets/StatsWidget.swift
      - path: App/Widgets/WidgetDesignSystem.swift
    dependencies:
      - package: OikomiKit
        product: OikomiKit
    info:
      path: App/WatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Oikomi Watch Widgets
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "11"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: App/WatchWidgets/OikomiWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.shuhirouchi.oikomi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shuhirouchi.oikomi.watchkitapp.widgets
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "4"

schemes:
  Oikomi:
    build:
      targets:
        Oikomi: all
    run:
      config: Debug
      storeKitConfiguration: Oikomi.storekit
    test:
      config: Debug
    archive:
      config: Release
  OikomiWatch:
    build:
      targets:
        OikomiWatch: all
    run:
      config: Debug
      storeKitConfiguration: Oikomi.storekit
